---
# solve.yml — Module 03: Proactive Network Operations with EDA

# Step 1: Look up EDA object IDs for Network Event rulebook activation
- name: Get EDA organization ID
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/eda/v1/organizations/?name=Default"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_eda_org

- name: Get EDA project ID
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/eda/v1/projects/?name=Roadshow"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_eda_project

- name: Get EDA credential ID
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/eda/v1/eda-credentials/?name=AAP"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_eda_cred

- name: Get decision environment ID (Network Telemetry)
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/eda/v1/decision-environments/?name=Network+Telemetry"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_eda_de

- name: Get rulebook ID (network_stats.yml)
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/eda/v1/rulebooks/?name=network_stats.yml&project_id={{ r_eda_project.json.results[0].id }}"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_eda_rulebook

# Step 2: Create the "Network Event" rulebook activation
- name: Check if Network Event activation already exists
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/eda/v1/activations/?name=Network+Event"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_existing_activation

- name: Create Network Event rulebook activation
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/eda/v1/activations/"
    method: POST
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      name: "Network Event"
      description: "Rulebook to listen to Network Telemetry"
      organization_id: "{{ r_eda_org.json.results[0].id }}"
      project_id: "{{ r_eda_project.json.results[0].id }}"
      rulebook_id: "{{ r_eda_rulebook.json.results[0].id }}"
      eda_credential_id: "{{ r_eda_cred.json.results[0].id }}"
      decision_environment_id: "{{ r_eda_de.json.results[0].id }}"
      restart_policy: "on-failure"
      log_level: "error"
    status_code: [200, 201]
  when: r_existing_activation.json.count == 0
  register: r_new_activation

- name: Set activation ID
  ansible.builtin.set_fact:
    activation_id: "{{ r_new_activation.json.id if r_existing_activation.json.count == 0 else r_existing_activation.json.results[0].id }}"

# Step 3: Wait for activation to be running
- name: Wait for Network Event activation to be running
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/eda/v1/activations/{{ activation_id }}/"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_activation_status
  until: r_activation_status.json.status == 'running'
  retries: 30
  delay: 10

# Step 4: Simulate network failure (S.E.A.N option 3 — Disable Port / break BGP)
- name: Get Disable Port template
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/?name=Disable+Port"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_disable_port

- name: Launch Disable Port
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/{{ r_disable_port.json.results[0].id }}/launch/"
    method: POST
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body: {}
    status_code: [200, 201]
  register: r_launch_disable

- name: Wait for Disable Port to complete
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/jobs/{{ r_launch_disable.json.id }}/"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_disable_job
  until: r_disable_job.json.status in ['successful', 'failed', 'error', 'canceled']
  retries: 30
  delay: 10

- name: Warn if Disable Port failed
  ansible.builtin.debug:
    msg: "WARNING: Disable Port finished with status: {{ r_disable_job.json.status }}"
  when: r_disable_job.json.status != 'successful'

# Step 5: Wait for EDA to auto-trigger Network Troubleshooting
- name: Get Network Troubleshooting template
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/?name=Network+Troubleshooting"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_net_troubleshoot

- name: Wait for EDA-triggered Network Troubleshooting job
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/{{ r_net_troubleshoot.json.results[0].id }}/jobs/?order_by=-created&page_size=1"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_troubleshoot_jobs
  until: >-
    r_troubleshoot_jobs.json.count > 0 and
    r_troubleshoot_jobs.json.results[0].status in ['successful', 'failed', 'error', 'canceled']
  retries: 30
  delay: 10

- name: Warn if Network Troubleshooting failed
  ansible.builtin.debug:
    msg: "WARNING: Network Troubleshooting finished with status: {{ r_troubleshoot_jobs.json.results[0].status }}"
  when: r_troubleshoot_jobs.json.results[0].status != 'successful'

# Step 6: Launch Show Port Config
- name: Get Show Port Config template
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/?name=Show+Port+Config"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_show_port

- name: Launch Show Port Config
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/{{ r_show_port.json.results[0].id }}/launch/"
    method: POST
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body: {}
    status_code: [200, 201]
  register: r_launch_show_port

- name: Wait for Show Port Config to complete
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/jobs/{{ r_launch_show_port.json.id }}/"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_show_port_job
  until: r_show_port_job.json.status in ['successful', 'failed', 'error', 'canceled']
  retries: 30
  delay: 10

# Step 7: Simulate plugging in new server (S.E.A.N option 4 — Make Port Active)
- name: Get Make Port Active template
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/?name=Make+Port+Active"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_make_port

- name: Launch Make Port Active
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/{{ r_make_port.json.results[0].id }}/launch/"
    method: POST
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body: {}
    status_code: [200, 201]
  register: r_launch_make_port

- name: Wait for Make Port Active to complete
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/jobs/{{ r_launch_make_port.json.id }}/"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_make_port_job
  until: r_make_port_job.json.status in ['successful', 'failed', 'error', 'canceled']
  retries: 30
  delay: 10

# Step 8: Wait for EDA to trigger "New Device Active" workflow, then approve it
- name: Wait for New Device Active workflow job to appear
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/workflow_job_templates/?name=New+Device+Active"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_wf_template

- name: Wait for pending workflow job
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/workflow_jobs/?workflow_job_template={{ r_wf_template.json.results[0].id }}&order_by=-created&page_size=1"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_wf_jobs
  until: r_wf_jobs.json.count > 0
  retries: 30
  delay: 10

- name: Get workflow approval nodes
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/workflow_jobs/{{ r_wf_jobs.json.results[0].id }}/workflow_nodes/"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_wf_nodes

- name: Find pending approval
  ansible.builtin.set_fact:
    pending_approval_id: "{{ item.summary_fields.job.id }}"
  loop: "{{ r_wf_nodes.json.results }}"
  when: item.summary_fields.job is defined and item.summary_fields.job.type is defined and item.summary_fields.job.type == 'workflow_approval' and item.summary_fields.job.status == 'pending'

- name: Approve the workflow
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/workflow_approvals/{{ pending_approval_id }}/approve/"
    method: POST
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body: {}
    status_code: [200, 201, 204]
  when: pending_approval_id is defined

# Step 9: Wait for workflow to complete
- name: Wait for New Device Active workflow to complete
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/workflow_jobs/{{ r_wf_jobs.json.results[0].id }}/"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_wf_status
  until: r_wf_status.json.status in ['successful', 'failed', 'error', 'canceled']
  retries: 30
  delay: 10

- name: Warn if workflow failed
  ansible.builtin.debug:
    msg: "WARNING: New Device Active workflow finished with status: {{ r_wf_status.json.status }}"
  when: r_wf_status.json.status != 'successful'
