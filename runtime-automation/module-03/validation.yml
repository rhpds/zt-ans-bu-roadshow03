---
# validation.yml — Module 03: Proactive Network Operations with EDA

# Check Network Event rulebook activation exists and is running
- name: Get Network Event activation
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/eda/v1/activations/?name=Network+Event"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_activation

# Check Network Troubleshooting has been launched
- name: Get Network Troubleshooting template
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/?name=Network+Troubleshooting"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_net_troubleshoot

- name: Get Network Troubleshooting jobs
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/{{ r_net_troubleshoot.json.results[0].id }}/jobs/?order_by=-finished&page_size=10"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_troubleshoot_jobs
  when: r_net_troubleshoot.json.count > 0

# Check Show Port Config has been launched
- name: Get Show Port Config template
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/?name=Show+Port+Config"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_show_port

- name: Get Show Port Config jobs
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/{{ r_show_port.json.results[0].id }}/jobs/?order_by=-finished&page_size=10"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_show_port_jobs
  when: r_show_port.json.count > 0

# Check New Device Active workflow has been launched
- name: Get New Device Active workflow template
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/workflow_job_templates/?name=New+Device+Active"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_wf_template

- name: Get New Device Active workflow jobs
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/workflow_jobs/?workflow_job_template={{ r_wf_template.json.results[0].id }}&order_by=-finished&page_size=10"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_wf_jobs
  when: r_wf_template.json.count > 0

# Evaluate results
- name: Set validation results
  ansible.builtin.set_fact:
    activation_ok: "{{ r_activation.json.count > 0 and r_activation.json.results[0].status == 'running' }}"
    troubleshoot_ok: "{{ r_net_troubleshoot.json.count > 0 and (r_troubleshoot_jobs.json.results | default([]) | selectattr('status', 'equalto', 'successful') | list | length > 0) }}"
    show_port_ok: "{{ r_show_port.json.count > 0 and (r_show_port_jobs.json.results | default([]) | selectattr('status', 'equalto', 'successful') | list | length > 0) }}"
    workflow_ok: "{{ r_wf_template.json.count > 0 and (r_wf_jobs.json.results | default([]) | selectattr('status', 'equalto', 'successful') | list | length > 0) }}"

- name: Set validation output
  ansible.builtin.set_fact:
    validation_output: |
      Module 3 Validation
      ===================
      {{ '[OK]' if activation_ok | bool else '[X] ' }} Network Event rulebook activation running
      {{ '[OK]' if troubleshoot_ok | bool else '[X] ' }} Network Troubleshooting job launched (EDA triggered)
      {{ '[OK]' if show_port_ok | bool else '[X] ' }} Show Port Config job launched
      {{ '[OK]' if workflow_ok | bool else '[X] ' }} New Device Active workflow completed
    validation_passed: >-
      {{ activation_ok | bool and troubleshoot_ok | bool and show_port_ok | bool and workflow_ok | bool }}

- name: Write failure details
  ansible.builtin.copy:
    content: "{{ validation_output }}"
    dest: "{{ job_info_dir }}/validation_failure.out"
  delegate_to: localhost
  when:
    - job_info_dir is defined
    - not validation_passed | bool

- name: Fail if not passed
  ansible.builtin.fail:
    msg: "Complete the missing tasks and try again."
  when: not validation_passed | bool
