---
# validation.yml — Module 01: Operational Efficiency with Event-Driven Ansible

# Check Web-App Event rulebook activation exists and is running
- name: Get Web-App Event activation
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/eda/v1/activations/?name=Web-App+Event"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_activation

# Check Break Web-Application has been launched
- name: Get Break Web-Application template
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/?name=Break+Web-Application"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_break_web

- name: Get Break Web-Application jobs
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/{{ r_break_web.json.results[0].id }}/jobs/?order_by=-finished&page_size=10"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_break_jobs
  when: r_break_web.json.count > 0

# Check Restore Web-Application has been launched
- name: Get Restore Web-Application template
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/?name=Restore+Web-Application"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_restore_web

- name: Get Restore Web-Application jobs
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/{{ r_restore_web.json.results[0].id }}/jobs/?order_by=-finished&page_size=10"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_restore_jobs
  when: r_restore_web.json.count > 0

# Evaluate results
- name: Set validation results
  ansible.builtin.set_fact:
    activation_ok: "{{ r_activation.json.count > 0 and r_activation.json.results[0].status == 'running' }}"
    break_ok: "{{ r_break_web.json.count > 0 and (r_break_jobs.json.results | default([]) | selectattr('status', 'equalto', 'successful') | list | length > 0) }}"
    restore_ok: "{{ r_restore_web.json.count > 0 and (r_restore_jobs.json.results | default([]) | selectattr('status', 'equalto', 'successful') | list | length > 0) }}"

- name: Set validation output
  ansible.builtin.set_fact:
    validation_output: |
      Module 1 Validation
      ===================
      {{ '[OK]' if activation_ok | bool else '[X] ' }} Web-App Event rulebook activation running
      {{ '[OK]' if break_ok | bool else '[X] ' }} Break Web-Application job launched
      {{ '[OK]' if restore_ok | bool else '[X] ' }} Restore Web-Application job launched (EDA triggered)
    validation_passed: >-
      {{ activation_ok | bool and break_ok | bool and restore_ok | bool }}

- name: Write failure details
  ansible.builtin.copy:
    content: "{{ validation_output }}"
    dest: "{{ job_info_dir }}/validation_failure.out"
  delegate_to: localhost
  when:
    - job_info_dir is defined
    - not validation_passed | bool

- name: Fail if not passed
  ansible.builtin.fail:
    msg: "Complete the missing tasks and try again."
  when: not validation_passed | bool
