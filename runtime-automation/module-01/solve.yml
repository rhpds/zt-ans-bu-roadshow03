---
# solve.yml — Module 01: Operational Efficiency with Event-Driven Ansible

# Step 1: Look up EDA object IDs needed for rulebook activation
- name: Get EDA organization ID
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/eda/v1/organizations/?name=Default"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_eda_org

- name: Get EDA project ID
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/eda/v1/projects/?name=Roadshow"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_eda_project

- name: Get EDA credential ID
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/eda/v1/eda-credentials/?name=AAP"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_eda_cred

- name: Get decision environment ID (Web Server)
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/eda/v1/decision-environments/?name=Web+Server"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_eda_de

- name: Get rulebook ID (Webapp.yml)
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/eda/v1/rulebooks/?name=Webapp.yml&project_id={{ r_eda_project.json.results[0].id }}"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_eda_rulebook

# Step 2: Create the "Web-App Event" rulebook activation
- name: Check if Web-App Event activation already exists
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/eda/v1/activations/?name=Web-App+Event"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_existing_activation

- name: Create Web-App Event rulebook activation
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/eda/v1/activations/"
    method: POST
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body:
      name: "Web-App Event"
      description: "Rulebook to listen to configuration issues"
      organization_id: "{{ r_eda_org.json.results[0].id }}"
      project_id: "{{ r_eda_project.json.results[0].id }}"
      rulebook_id: "{{ r_eda_rulebook.json.results[0].id }}"
      eda_credential_id: "{{ r_eda_cred.json.results[0].id }}"
      decision_environment_id: "{{ r_eda_de.json.results[0].id }}"
      restart_policy: "on-failure"
      log_level: "error"
    status_code: [200, 201]
  when: r_existing_activation.json.count == 0
  register: r_new_activation

- name: Set activation ID
  ansible.builtin.set_fact:
    activation_id: "{{ r_new_activation.json.id if r_existing_activation.json.count == 0 else r_existing_activation.json.results[0].id }}"

# Step 3: Wait for activation to be running
- name: Wait for rulebook activation to be running
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/eda/v1/activations/{{ activation_id }}/"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_activation_status
  until: r_activation_status.json.status == 'running'
  retries: 30
  delay: 10

# Step 4: Launch Break Web-Application
- name: Get Break Web-Application template
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/?name=Break+Web-Application"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_break_web

- name: Launch Break Web-Application
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/{{ r_break_web.json.results[0].id }}/launch/"
    method: POST
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body: {}
    status_code: [200, 201]
  register: r_launch_break

- name: Wait for Break Web-Application to complete
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/jobs/{{ r_launch_break.json.id }}/"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_break_job
  until: r_break_job.json.status in ['successful', 'failed', 'error', 'canceled']
  retries: 30
  delay: 10

- name: Warn if Break Web-Application failed
  ansible.builtin.debug:
    msg: "WARNING: Break Web-Application finished with status: {{ r_break_job.json.status }}"
  when: r_break_job.json.status != 'successful'

# Step 5: Wait for EDA to auto-trigger Restore Web-Application
- name: Get Restore Web-Application template
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/?name=Restore+Web-Application"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_restore_web

- name: Wait for EDA-triggered Restore Web-Application job
  ansible.builtin.uri:
    url: "{{ aap_host }}/api/controller/v2/job_templates/{{ r_restore_web.json.results[0].id }}/jobs/?order_by=-created&page_size=1"
    user: "{{ aap_username }}"
    password: "{{ aap_password }}"
    force_basic_auth: true
    validate_certs: false
  register: r_restore_jobs
  until: >-
    r_restore_jobs.json.count > 0 and
    r_restore_jobs.json.results[0].status in ['successful', 'failed', 'error', 'canceled']
  retries: 30
  delay: 10

- name: Warn if Restore Web-Application failed
  ansible.builtin.debug:
    msg: "WARNING: Restore Web-Application finished with status: {{ r_restore_jobs.json.results[0].status }}"
  when: r_restore_jobs.json.results[0].status != 'successful'
